<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIMI-CUB - Sistema de Cubicaciones</title>
    <!-- React & Tailwind CDN for Quick Visualization only -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS y html2pdf para exportaciones -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Mock Icons (replacing Lucide for CDN)
        const Icon = ({ name }) => {
            const icons = {
                dashboard: "📊",
                cubicaciones: "📐",
                planificacion: "📅",
                mantenedores: "⚙️",
                status: "✔️",
                user: "👤",
                edit: "✏️",
                delete: "🗑️",
                plus: "➕"
            };
            return <span>{icons[name]}</span>;
        };

        // ============================================================
        //  COMPONENTE: PartidasPage - Carga Masiva de Itemizado
        // ============================================================
        const PartidasPage = ({ proyectos, askConfirm, showSuccess, onVolver, updateItemizadosGlobal, itemizadosPorProyecto }) => {
            const { useState, useRef, useEffect } = React;
            const [obraSeleccionada, setObraSeleccionada] = useState(null);
            const [itemizado, setItemizado] = useState([]);
            const [nombreArchivo, setNombreArchivo] = useState('');
            const [fase, setFase] = useState('seleccion'); // 'seleccion' | 'carga' | 'preview' | 'saved'
            const [errores, setErrores] = useState([]);
            const [editRowId, setEditRowId] = useState(null);
            const fileInputRef = useRef(null);

            const COLUMNAS = [
                'Item', 'Descripcion_Item', 'Concepto', 'Responsable',
                'Unidad_Medida', 'Cantidad', 'HH_Total',
                'Precio_Unitario', 'Rendimiento', 'Precio_Total'
            ];

            const downloadPlantilla = () => {
                const filas = [
                    COLUMNAS,
                    ['1', 'Movimiento de tierras', 'Excavación mecanizada', 'Operador', 'm3', 150, 240, 38500, 0.625, 5775000],
                    ['2', 'Hormigón emplantillado', 'Fundación corrida H20', 'Maestro', 'm3', 45, 540, 95000, 0.333, 4275000],
                    ['3', 'Enfierradura', 'Armadura D10 fundaciones', 'Enfierrador', 'kg', 2800, 1120, 1850, 2.5, 5180000],
                ];
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(filas);
                // Ancho de columnas
                ws['!cols'] = [4, 28, 28, 18, 10, 10, 10, 14, 12, 14].map(w => ({ wch: w }));
                XLSX.utils.book_append_sheet(wb, ws, 'Itemizado');
                XLSX.writeFile(wb, 'plantilla_itemizado_obra.xlsx');
            };

            const calculateHierarchyTotals = (items) => {
                if (!items || items.length === 0) return [];
                
                // Función para ordenamiento natural (1.2 < 1.10)
                const naturalSort = (a, b) => {
                    const partsA = String(a.Item).split('.').map(p => parseInt(p) || 0);
                    const partsB = String(b.Item).split('.').map(p => parseInt(p) || 0);
                    for (let i = 0; i < Math.max(partsA.length, partsB.length); i++) {
                        const valA = partsA[i] || 0;
                        const valB = partsB[i] || 0;
                        if (valA !== valB) return valA - valB;
                    }
                    return 0;
                };

                const sortedItems = [...items].sort(naturalSort);
                
                // Normalizar: "2.0" -> "2", "2.1" -> "2.1"
                const getNorm = (s) => String(s || '').trim().replace(/\.0$/, '');
                
                // Obtener todos los ítems únicos normalizados
                const allNorms = [...new Set(sortedItems.map(it => getNorm(it.Item)))];
                
                // Mapear cada norma a sus filas originales
                const rowsByNorm = {};
                sortedItems.forEach(it => {
                    const norm = getNorm(it.Item);
                    if (!rowsByNorm[norm]) rowsByNorm[norm] = [];
                    rowsByNorm[norm].push(it);
                });

                const memo = {};

                const getSumRecursive = (norm) => {
                    if (memo[norm] !== undefined) return memo[norm];

                    // Hijos directos: empiezan por norm + '.' y no tienen más puntos después del prefijo
                    const prefix = norm + '.';
                    const directChildren = allNorms.filter(n => {
                        if (n.startsWith(prefix) && n !== norm) {
                            const partAfter = n.slice(prefix.length);
                            return !partAfter.includes('.');
                        }
                        return false;
                    });

                    let total = 0;
                    if (directChildren.length > 0) {
                        // Si tiene hijos directos, el total es LA SUMA de esos hijos
                        total = directChildren.reduce((acc, cn) => acc + getSumRecursive(cn), 0);
                    } else {
                        // Si es una hoja, el total es la suma de Cantidad * Precio de sus propias filas
                        total = rowsByNorm[norm].reduce((acc, row) => {
                            const c = parseFloat(row.Cantidad) || 0;
                            const p = parseFloat(row.Precio_Unitario) || 0;
                            return acc + (c * p);
                        }, 0);
                    }

                    memo[norm] = total;
                    return total;
                };

                return sortedItems.map(it => ({
                    ...it,
                    _TotalCalc: getSumRecursive(getNorm(it.Item)),
                    _CantidadNum: parseFloat(it['Cantidad']) || 0,
                    _PrecioUNum: parseFloat(it['Precio_Unitario']) || 0,
                    _HHNum: parseFloat(it['HH_Total']) || 0,
                    _RendNum: parseFloat(parseFloat(it['Rendimiento'] || 0).toFixed(2))
                }));
            };

            const parseFile = (file) => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const sheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[sheetName];
                        const json = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                        if (json.length < 2) {
                            resolve({ data: [], errs: ['El archivo está vacío o sin datos.'] });
                            return;
                        }

                        const header = json[0].map(h => String(h).trim());
                        const errs = [];

                        const missingCols = COLUMNAS.filter(c => !header.some(h => h.toLowerCase() === c.toLowerCase()));
                        if (missingCols.length > 0) {
                            errs.push(`Columnas faltantes: ${missingCols.join(', ')}`);
                            resolve({ data: [], errs });
                            return;
                        }

                        const getIdx = (col) => header.findIndex(h => h.toLowerCase() === col.toLowerCase());

                        const parsedData = json.slice(1).map((rowArr, i) => {
                            const row = {};
                            COLUMNAS.forEach(col => {
                                const val = rowArr[getIdx(col)];
                                row[col] = val !== undefined && val !== null ? String(val).trim() : '';
                            });
                            row._lineaOriginal = i + 2;
                            row._id = Date.now() + i; // ID único para edición
                            return row;
                        }).filter(r => r['Item'] !== '');

                        const finalData = calculateHierarchyTotals(parsedData);
                        resolve({ data: finalData, errs });
                    };
                    reader.onerror = (error) => reject(error);
                    reader.readAsArrayBuffer(file);
                });
            };

            const handleUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setNombreArchivo(file.name);
                try {
                    const { data, errs } = await parseFile(file);
                    setErrores(errs);
                    if (errs.length === 0 && data.length > 0) {
                        const withObra = data.map(r => ({ ...r, _obraId: obraSeleccionada.id, _obraNombre: obraSeleccionada.nombre }));
                        setItemizado(withObra);
                        setFase('preview');
                    } else if (errs.length > 0) {
                        setItemizado([]);
                        setFase('carga');
                    }
                } catch (error) {
                    console.error("Error al procesar el archivo:", error);
                    setErrores(['Error al leer el archivo. Asegúrate de que sea un formato válido.']);
                    setItemizado([]);
                    setFase('carga');
                } finally {
                    // Reset file input to allow re-uploading the same file
                    if (fileInputRef.current) {
                        fileInputRef.current.value = '';
                    }
                }
            };

            const handleConfirmar = () => {
                askConfirm(
                    'Confirmar Carga de Itemizado',
                    `¿Deseas guardar ${itemizado.length} ítems asociados a "${obraSeleccionada.nombre}"? Esto reemplazará cualquier itemizado previo de esta obra.`,
                    () => {
                        updateItemizadosGlobal(obraSeleccionada.id, itemizado);
                        showSuccess(`✓ ${itemizado.length} ítems cargados exitosamente en "${obraSeleccionada.nombre}"`);
                        setFase('saved');
                        setNombreArchivo('');
                        setEditRowId(null);
                    }
                );
            };

            const handleEditChange = (id, field, value) => {
                setItemizado(prev => {
                    const newList = prev.map(row => row._id === id ? { ...row, [field]: value } : row);
                    return calculateHierarchyTotals(newList);
                });
            };

            const handleDeleteRow = (id) => {
                askConfirm('Eliminar Ítem', '¿Estás seguro de eliminar este ítem del listado?', () => {
                    setItemizado(prev => {
                        const newList = prev.filter(row => row._id !== id);
                        return calculateHierarchyTotals(newList);
                    });
                    showSuccess('Ítem eliminado');
                });
            };

            const fmtNum = (n) => typeof n === 'number' ? n.toLocaleString('es-CL') : n;
            const fmtMoney = (n) => '$' + (parseFloat(n) || 0).toLocaleString('es-CL');
            const fmtRend = (n) => (parseFloat(n) || 0).toLocaleString('es-CL', { minimumFractionDigits: 0, maximumFractionDigits: 2 });

            // Totales Generales (solo sumar raíces)
            const getNorm = (s) => String(s || '').trim().replace(/\.0$/, '');
            const allNorms = [...new Set(itemizado.map(r => getNorm(r.Item)))];
            const rootNorms = allNorms.filter(n => !allNorms.some(p => n.startsWith(getNorm(p) + '.') && n !== getNorm(p)));
            
            const totalGeneral = rootNorms.reduce((acc, n) => {
                const anyRow = itemizado.find(r => getNorm(r.Item) === n);
                return acc + (anyRow ? anyRow._TotalCalc : 0);
            }, 0);

            // HH Totales (estas siguen siendo la suma simple de todas las filas para control)
            const totalHH = itemizado.reduce((acc, row) => acc + (parseFloat(row.HH_Total) || 0), 0);

            // Estilos ultra-compactos para la tabla
            const thCls = "p-2 px-2 font-bold text-slate-400 uppercase whitespace-nowrap text-[9px] tracking-tighter";
            const tdCls = "p-2 px-2 text-[11px]";
            const inputCls = "w-full border border-blue-300 rounded px-1.5 py-0.5 text-[10px] outline-none focus:ring-2 focus:ring-blue-400 bg-white shadow-sm";

            return (
                <div class="space-y-4 text-left">
                    {/* Encabezado */}
                    <div class="flex justify-between items-center gap-2">
                        <button
                            class="text-slate-500 text-xs font-bold flex items-center gap-1.5 hover:text-blue-600 transition-colors whitespace-nowrap"
                            onClick={() => { setFase('seleccion'); setItemizado([]); setObraSeleccionada(null); setNombreArchivo(''); setEditRowId(null); onVolver && onVolver(); }}
                        >
                            ← Volver
                        </button>
                        <button
                            class="bg-emerald-50 text-emerald-700 border border-emerald-200 px-3 py-1.5 rounded-lg text-[10px] font-bold flex items-center gap-1.5 hover:bg-emerald-100 transition-all shadow-sm"
                            onClick={downloadPlantilla}
                        >
                            📥 Plantilla (.xlsx)
                        </button>
                    </div>

                    {/* Banner informativo compacto */}
                    <div class="bg-gradient-to-r from-blue-900 to-slate-900 text-white rounded-xl p-4 shadow-lg">
                        <div class="flex items-center gap-3">
                            <div class="text-2xl">📋</div>
                            <div class="flex-1">
                                <h3 class="font-extrabold text-sm mb-0.5 tracking-tight">Carga Masiva de Itemizado</h3>
                                <div class="flex flex-wrap gap-1 mt-1 opacity-80">
                                    {COLUMNAS.slice(0, 5).map(c => (
                                        <span key={c} class="px-1.5 py-0.5 bg-white/10 text-blue-100 rounded text-[8px] font-bold uppercase border border-white/10">{c.replace(/_/g, ' ')}</span>
                                    ))}
                                    <span class="text-[8px] font-bold text-blue-300">... y más</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Paso 1: Selección de Obra */}
                    <div class={`bg-white rounded-2xl border shadow-sm transition-all ${fase === 'seleccion' ? 'border-blue-200 shadow-blue-100' : 'border-slate-200'}`}>
                        <div class="p-5 border-b border-slate-100 flex items-center gap-3">
                            <div class={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-extrabold flex-shrink-0 ${obraSeleccionada ? 'bg-green-500 text-white' : 'bg-blue-600 text-white'}`}>
                                {obraSeleccionada ? '✓' : '1'}
                            </div>
                            <h4 class="font-bold text-slate-800 text-sm">Seleccionar Obra Destino</h4>
                        </div>
                        <div class="p-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 items-end">
                                <div>
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Obra / Proyecto</label>
                                    <select
                                        class="w-full border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white font-medium"
                                        value={obraSeleccionada?.id || ''}
                                        onChange={e => {
                                            const p = proyectos.find(x => x.id === parseInt(e.target.value));
                                            setObraSeleccionada(p || null);
                                            setEditRowId(null);
                                            setNombreArchivo('');
                                            setErrores([]);
                                            if (p) {
                                                const savedData = itemizadosPorProyecto[p.id];
                                                if (savedData && savedData.length > 0) {
                                                    setItemizado(savedData);
                                                    setFase('saved');
                                                } else {
                                                    setItemizado([]);
                                                    setFase('carga');
                                                }
                                            } else {
                                                setItemizado([]);
                                                setFase('seleccion');
                                            }
                                        }}
                                    >
                                        <option value="">-- Seleccione una obra --</option>
                                        {proyectos.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
                                    </select>
                                </div>
                                {obraSeleccionada && (
                                    <div class="flex items-center gap-3 bg-green-50 border border-green-200 rounded-xl px-4 py-3">
                                        <div class="w-9 h-9 rounded-full bg-green-500 flex items-center justify-center text-white font-extrabold text-sm">{obraSeleccionada.nombre.charAt(0)}</div>
                                        <div>
                                            <p class="font-extrabold text-green-800 text-sm">{obraSeleccionada.nombre}</p>
                                            <p class="text-green-600 text-[10px]">{obraSeleccionada.descripcion}</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Paso 2: Mostrar itemizado guardado o zona de carga */}
                    {fase === 'saved' && obraSeleccionada && (
                        <div class="bg-white rounded-2xl border border-emerald-200 shadow-sm p-5 flex items-center justify-between gap-4 animate-in fade-in duration-300">
                            <div class="flex items-center gap-3">
                                <div class="w-9 h-9 rounded-full bg-emerald-500 flex items-center justify-center text-white font-bold text-sm">✓</div>
                                <div>
                                    <p class="font-extrabold text-emerald-800 text-sm">Itemizado cargado: {(itemizadosPorProyecto[obraSeleccionada.id] || []).length} ítems</p>
                                    <p class="text-emerald-600 text-[10px] mt-0.5">Obra: {obraSeleccionada.nombre}</p>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                <button
                                    class="px-4 py-2 rounded-xl text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 transition-colors shadow-md"
                                    onClick={() => { setFase('preview'); setItemizado(itemizadosPorProyecto[obraSeleccionada.id] || []); }}
                                >👁️ Ver Itemizado</button>
                                <label class="px-4 py-2 rounded-xl text-xs font-bold text-white bg-amber-500 hover:bg-amber-600 transition-colors shadow-md cursor-pointer flex items-center gap-1.5">
                                    🔄 Reemplazar Excel
                                    <input type="file" accept=".xls,.xlsx,.csv" class="hidden" onChange={async (e) => {
                                        const file = e.target.files[0];
                                        if (!file) return;
                                        setNombreArchivo(file.name);
                                        try {
                                            const { data, errs } = await parseFile(file);
                                            setErrores(errs);
                                            if (errs.length === 0 && data.length > 0) {
                                                const withObra = data.map(r => ({ ...r, _obraId: obraSeleccionada.id, _obraNombre: obraSeleccionada.nombre }));
                                                setItemizado(withObra);
                                                setFase('preview');
                                            }
                                        } catch(err) {
                                            setErrores(['Error al leer el archivo.']);
                                        }
                                        if (e.target) e.target.value = '';
                                    }} />
                                </label>
                            </div>
                        </div>
                    )}

                    {/* Paso 2: Carga del Archivo (cuando no hay datos guardados) */}
                    {(fase === 'carga' || fase === 'preview') && (
                        <div class={`bg-white rounded-2xl border shadow-sm transition-all ${fase === 'carga' ? 'border-blue-200 shadow-blue-100' : 'border-slate-200'}`}>
                            <div class="p-5 border-b border-slate-100 flex items-center gap-3">
                                <div class={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-extrabold flex-shrink-0 ${fase === 'preview' ? 'bg-green-500 text-white' : 'bg-blue-600 text-white'}`}>
                                    {fase === 'preview' ? '✓' : '2'}
                                </div>
                                <h4 class="font-bold text-slate-800 text-sm">Subir Archivo XLS / CSV</h4>
                                {nombreArchivo !== '' && (
                                    <span class="ml-auto text-[10px] font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 px-3 py-1 rounded-full">📄 {nombreArchivo}</span>
                                )}
                            </div>
                            <div class="p-6">
                                {errores.length > 0 && (
                                    <div class="mb-4 bg-red-50 border border-red-200 rounded-xl p-4">
                                        <p class="text-xs font-bold text-red-600 mb-1">⚠ Errores en el archivo:</p>
                                        {errores.map((e, i) => <p key={i} class="text-xs text-red-500">{e}</p>)}
                                    </div>
                                )}
                                <label class="block border-2 border-dashed border-slate-200 rounded-2xl p-10 text-center bg-slate-50 hover:border-blue-400 hover:bg-blue-50/40 transition-all cursor-pointer group relative">
                                    <div class="text-5xl mb-3 opacity-20 group-hover:opacity-50 transition-opacity">📂</div>
                                    <p class="text-sm font-bold text-slate-500 group-hover:text-blue-600">Haz clic aquí para seleccionar tu archivo XLS o CSV</p>
                                    <p class="text-[10px] text-slate-400 mt-1">Archivos .xls, .xlsx o .csv · Formato: columnas según la plantilla</p>
                                    <input
                                        type="file"
                                        accept=".xls,.xlsx,.csv"
                                        class="absolute inset-0 opacity-0 cursor-pointer"
                                        onChange={handleUpload}
                                        ref={fileInputRef}
                                    />
                                </label>
                            </div>
                        </div>
                    )}

                    {/* Paso 3: Vista Previa y Confirmación */}
                    {fase === 'preview' && itemizado.length > 0 && (
                        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                            {/* Cabecera con KPIs */}
                            <div class="p-5 border-b border-slate-100">
                                <div class="flex justify-between items-center mb-4">
                                    <div>
                                        <h4 class="font-extrabold text-slate-800 text-sm">Vista Previa — {itemizado.length} ítems cargados</h4>
                                        <p class="text-xs text-slate-400 mt-0.5">Obra: <span class="font-bold text-slate-600">{obraSeleccionada.nombre}</span></p>
                                    </div>
                                    <div class="flex gap-3">
                                        <button
                                            class="px-4 py-2 rounded-xl text-xs font-bold text-slate-500 hover:bg-slate-100 transition-colors border border-slate-200"
                                            onClick={() => { setFase('carga'); setItemizado([]); setNombreArchivo(''); setEditRowId(null); }}
                                        >
                                            Cambiar Archivo
                                        </button>
                                        <button
                                            class="bg-blue-600 text-white px-6 py-2 rounded-xl text-xs font-bold shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition-all flex items-center gap-2"
                                            onClick={handleConfirmar}
                                        >
                                            ✓ Confirmar y Guardar Itemizado
                                        </button>
                                    </div>
                                </div>
                                {/* KPIs */}
                                <div class="grid grid-cols-3 gap-4">
                                    <div class="bg-slate-50 rounded-xl p-3 border border-slate-100">
                                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Ítems Totales</p>
                                        <p class="text-2xl font-extrabold text-slate-800">{itemizado.length}</p>
                                    </div>
                                    <div class="bg-blue-50 rounded-xl p-3 border border-blue-100">
                                        <p class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">HH Totales</p>
                                        <p class="text-2xl font-extrabold text-blue-700">{fmtNum(totalHH)}</p>
                                    </div>
                                    <div class="bg-emerald-50 rounded-xl p-3 border border-emerald-100">
                                        <p class="text-[9px] font-bold text-emerald-400 uppercase tracking-widest">Precio Total</p>
                                        <p class="text-lg font-extrabold text-emerald-700">{fmtMoney(totalGeneral)}</p>
                                    </div>
                                </div>
                            </div>

                            {/* Tabla de Itemizado - Scroll horizontal solo si es necesario */}
                            <div class="overflow-x-auto overflow-y-visible">
                                <table class="w-full text-left table-fixed min-w-[1000px]">
                                    <thead class="bg-slate-50 border-b border-slate-100 shadow-sm sticky top-0 z-10">
                                        <tr>
                                            <th class={thCls} style={{width:'50px'}}>Ítem</th>
                                            <th class={thCls} style={{width:'auto'}}>Descripción</th>
                                            <th class={thCls} style={{width:'120px'}}>Concepto</th>
                                            <th class={thCls} style={{width:'100px'}}>Resp.</th>
                                            <th class={thCls} style={{width:'60px', textAlign:'center'}}>Unid.</th>

        // ============================================================
        //  COMPONENTE: CubicacionesPage - Planilla Dinámica Inteligente

        const CubicacionesPage = ({ actividades, setActividades, unidades, proyectos, ponderaciones, especialidades, itemizadosPorProyecto, showSuccess, askConfirm }) => {
            const { useState, useEffect } = React;

            const [infoColumns, setInfoColumns] = useState(() => {
                const saved = localStorage.getItem('cubicaciones_info_columns');

                if (!saved) return base;
                const parsed = JSON.parse(saved);
                
                // Normalizar nombres antiguos (mayúsculas) para evitar duplicados
                const nameMap = {
                    'ITEM': 'Item',
                    'DESCRIPCIÓN': 'Descripción',
                    'DESCRIPCION': 'Descripción',
                    'DESCRIPCIÓN DEL ITEM': 'Descripción',
                    'ELEMENTO': 'Elemento',
                    'UBICACIÓN': 'Ubicación',
                    'UBICACION': 'Ubicación'
                };
                
                let merged = parsed.map(col => nameMap[col.toUpperCase()] || col);
                
                // Eliminar duplicados manteniendo primera aparición
                merged = merged.filter((item, pos) => merged.indexOf(item) === pos);

                // Migration: ensure 'Item' and 'Descripción' always exist
                if (!merged.includes('Item')) merged.unshift('Item');
                if (!merged.includes('Descripción')) merged.splice(1, 0, 'Descripción');
                
                return merged;
            });
            const [newColName, setNewColName] = useState('');
            const [showNewColForm, setShowNewColForm] = useState(false);
            const [itemizadoSearch, setItemizadoSearch] = useState('');
            const [showItemizadoDropdown, setShowItemizadoDropdown] = useState(false);
            const [edpItemFilter, setEdpItemFilter] = useState('');

            // Persistir orden de columnas
            React.useEffect(() => {
                localStorage.setItem('cubicaciones_info_columns', JSON.stringify(infoColumns));
            }, [infoColumns]);

            const moveColumn = (index, direction) => {
                const newCols = [...infoColumns];
                const newIndex = index + direction;
                if (newIndex < 0 || newIndex >= newCols.length) return;
                const temp = newCols[index];
                newCols[index] = newCols[newIndex];
                newCols[newIndex] = temp;
                setInfoColumns(newCols);
            };

            const removeColumn = (col) => {
                if (['Elemento', 'Ubicación'].includes(col)) return; // Columnas base no se borran
                setInfoColumns(infoColumns.filter(c => c !== col));
            };

            const [rows, setRows] = useState([]);
            const [hoveredCol, setHoveredCol] = useState(null);
            const [dragSubIdx, setDragSubIdx] = useState(null); // índice de la columna que se está arrastrando
            const [dragOverSubIdx, setDragOverSubIdx] = useState(null); // índice donde se está sobrevolando
            
            // Estado para el popup de adjuntar documentos
            const [uploadModal, setUploadModal] = useState({ show: false, rowId: null, type: 'Plano', file: null, activeFilter: 'Todos' });

            const handleDownloadAttachment = (att) => {
                if (!att.data) {
                    alert("⚠️ Este documento fue adjunto sin datos de descarga (versión anterior). Debe volver a adjuntarlo para poder descargarlo.");
                    return;
                }
                const link = document.createElement('a');
                link.href = att.data;
                link.download = att.name;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleAddAttachment = () => {
                if (!uploadModal.file) {
                    alert("⚠️ Debe seleccionar un archivo primero.");
                    return;
                }

                const file = uploadModal.file;
                const filename = file.name;
                const docType = uploadModal.type;

                const saveAttachment = (fileData) => {
                    setRows(prevRows => {
                        const newRows = prevRows.map(r => {
                            if (r.id === uploadModal.rowId) {
                                const currentAttachments = r.attachments || [];
                                return {
                                    ...r,
                                    attachments: [{ 
                                        name: filename, 
                                        type: docType, 
                                        data: fileData,
                                        date: new Date().toLocaleDateString('es-CL') + ' ' + new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' })
                                    }, ...currentAttachments]
                                };
                            }
                            return r;
                        });
                        
                        const key = `cubicaciones_data_${activeProject}_${activeActivityFilter}`;
                        try {
                            localStorage.setItem(key, JSON.stringify(newRows));
                            setTimeout(() => {
                                setUploadModal({ show: false, rowId: null, type: 'Plano', file: null, activeFilter: 'Todos' });
                                showSuccess(`✓ Documento "${filename}" adjunto correctamente.`);
                            }, 50);
                            return newRows;
                        } catch (e) {
                            alert("❌ El archivo excede la memoria local disponible en su navegador. Por favor suba un PDF más liviano, o borre otros documentos adjuntos para liberar espacio.");
                            return prevRows; // Cancel state update to prevent UI crash
                        }
                    });
                };

                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            const maxDimension = 1000;
                            
                            if (width > height && width > maxDimension) {
                                height *= maxDimension / width;
                                width = maxDimension;
                            } else if (height > maxDimension) {
                                width *= maxDimension / height;
                                height = maxDimension;
                            }
                            
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const compressedData = canvas.toDataURL('image/jpeg', 0.6);
                            saveAttachment(compressedData);
                        };
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                } else {
                    const reader = new FileReader();
                    reader.onload = (e) => saveAttachment(e.target.result);
                    reader.onerror = () => alert("❌ Error al leer el documento.");
                    reader.readAsDataURL(file);
                }

            const isEmptyRow = (r) => {

                if (hasFisico || hasEDP) return false;
                for (const [k, v] of Object.entries(r.mathParams || {})) {
                    if (k === 'cantidad') {

                        if (v !== '' && v !== null) return false;

            const exportToExcel = () => {

                        else if (valNum > takeoff && takeoff > 0) valNum = takeoff;

                        const progressKey = activeTab === 'fisico' ? 'subActivityProgress' : 'subActivityProgressEDP';
                        return { ...r, [progressKey]: { ...r[progressKey], [subId]: valNum } };
                    }
                    return r;
                }));
            };

            const updateSubActivityWeight = (actId, subId, newWeight) => {
                const val = parseFloat(newWeight) || 0;
                if (val < 0 || val > 100) return;
                const isEDP = activeTab === 'edp';
                const fieldKey = isEDP ? 'porcentajeEDP' : 'porcentaje';
                const updated = actividades.map(act => {
                    if (act.id !== actId) return act;
                    return { ...act, subActividades: (act.subActividades || []).map(s =>
                        s.id === subId ? { ...s, [fieldKey]: val } : s
                    )};
                });
                setActividades(updated);
                localStorage.setItem('app_actividades', JSON.stringify(updated));
                showSuccess(`Ponderación ${isEDP ? 'EDP' : 'Física'} actualizada.`);
            };

            const updateSubActivityName = (actId, subId, newName) => {
                const updated = actividades.map(act => {
                    if (act.id !== actId) return act;
                    return { ...act, subActividades: (act.subActividades || []).map(s =>
                        s.id === subId ? { ...s, nombre: newName } : s
                    )};
                });
                setActividades(updated);
                localStorage.setItem('app_actividades', JSON.stringify(updated));
            };

            const addSubActivityDirectly = (actId) => {
                const isEDP = activeTab === 'edp';
                const newSub = { id: Date.now(), nombre: 'Nueva Sub', desc: '', porcentaje: isEDP ? 0 : 10, porcentajeEDP: isEDP ? 10 : 0 };
                const updated = actividades.map(act => {
                    if (act.id !== actId) return act;
                    return { ...act, subActividades: [...(act.subActividades || []), newSub] };
                });
                setActividades(updated);
                localStorage.setItem('app_actividades', JSON.stringify(updated));
                showSuccess('✅ Sub-actividad añadida con 10%. Edita el nombre y % en el encabezado.');
            };

            const deleteSubActivityDirectly = (actId, subId) => {
                askConfirm('Eliminar Sub-actividad', '¿Está seguro de eliminar esta columna? Los datos de progreso se perderán.', () => {
                    const updated = actividades.map(act => {
                        if (act.id !== actId) return act;
                        return { ...act, subActividades: (act.subActividades || []).filter(s => s.id !== subId) };
                    });
                    setActividades(updated);
                    localStorage.setItem('app_actividades', JSON.stringify(updated));
                    showSuccess('Sub-actividad eliminada.');
                });
            };

            const reorderSubActivities = (actId, fromIdx, toIdx) => {
                if (fromIdx === toIdx) return;
                const updated = actividades.map(act => {
                    if (act.id !== actId) return act;
                    const subs = [...(act.subActividades || [])];
                    const [moved] = subs.splice(fromIdx, 1);
                    subs.splice(toIdx, 0, moved);
                    return { ...act, subActividades: subs };
                });
                setActividades(updated);
                localStorage.setItem('app_actividades', JSON.stringify(updated));
            };

            const handleActivityChange = (rowId, actIdStr) => {
                const actId = parseInt(actIdStr) || '';
                setRows(rows.map(r => {
                    if (r.id === rowId) {
                        return { ...r, actividadId: actId, subActivityProgress: {} };
                    }
                    return r;
                }));
            };

            const handleUnitChange = (rowId, unitIdStr) => {
                const unitId = parseInt(unitIdStr) || '';
                setRows(rows.map(r => {
                    if (r.id === rowId) {
                    return { ...r, unidadId: unitId, mathParams: { cantidad: 1 } };
                    }
                    return r;
                }));
            };

            const calculateTakeoff = (row) => {
                if (!row.unidadId) return 0;
                const unit = unidades.find(u => u.id === row.unidadId);
                if (!unit) return 0;

                let hasValidInput = false;
                const paramsMap = {};
                
                unit.params.forEach(p => {
                    const val = row.mathParams[p];
                    if (val !== undefined && val !== '') {
                        paramsMap[p] = parseFloat(val);
                        hasValidInput = true;
                    } else {
                        paramsMap[p] = 0;
                    }
                });

                if (!hasValidInput && unit.params.length > 0) return 0;

                let result = 1;

                if (unit.formula && unit.formula.trim() !== '') {
                    try {
                        let formulaStr = unit.formula.toLowerCase().replace(/\^/g, '**');
                        
                        const sortedParams = [...unit.params].sort((a,b) => b.length - a.length);
                        sortedParams.forEach(p => {
                            const escChar = p.toLowerCase().replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                            const regex = new RegExp('\\b' + escChar + '\\b', 'g');
                            formulaStr = formulaStr.replace(regex, `(${paramsMap[p]})`);
                        });

                        const calcFn = new Function(`return ${formulaStr};`);
                        result = calcFn();
                    } catch (err) {
                        console.error("Error evaluating formula:", unit.formula);
                        result = 0;
                    }
                } else {
                    unit.params.forEach(p => {
                        result *= paramsMap[p];
                    });
                }
                
                const cantidad = row.mathParams.cantidad !== undefined && row.mathParams.cantidad !== '' ? row.mathParams.cantidad : 1;
                const takeoff = (result * cantidad) || 0;
                return Math.round(takeoff * 100) / 100;
            };

            const getWeightSetting = (actId, subId) => {
                if (!activeProject || !actId) return 0;
                const key = `${activeProject}_${actId}_${subId}`;
                const config = ponderaciones[key];
                
                // Priorizar configuración por proyecto (EDP > Planificador > Cubicador)
                if (config) {
                    const projectWeight = parseFloat(config.edp) || parseFloat(config.planificador) || parseFloat(config.cubicador);
                    if (projectWeight !== undefined && projectWeight !== 0) return projectWeight;
                }

                // Fallback: Buscar en el maestro de actividades
                const act = actividades.find(a => a.id === actId);
                const sub = act?.subActividades?.find(s => s.id === subId);
                return parseFloat(sub?.porcentaje) || 0;
            };

            const calculatePhysicalProgress = (row, act, excludeProtocolo = false) => {
                if (!act || !act.subActividades || act.subActividades.length === 0) return 0;
                const takeoff = calculateTakeoff(row);
                const fisicaData = row?.subActivityProgress || {};
                const allSubs = act.subActividades || [];
                let totalPhysical = 0;
                let weightSum = 0;

                allSubs.forEach(sub => {
                    if (!sub) return;
                    const isProt = (sub.nombre || '').toLowerCase().includes('protocolo');
                    if (excludeProtocolo && isProt) return;

                    const weight = parseFloat(sub.porcentaje) || 0;
                    if (weight <= 0) return;
                    
                    const qty = parseFloat(fisicaData[sub.id]) || 0;
                    totalPhysical += qty * weight / 100;
                    weightSum += weight;
                });
                
                if (excludeProtocolo) {
                    if (weightSum <= 0 || takeoff <= 0) return 0;
                    const expected = (weightSum / 100) * takeoff;
                    if (expected <= 0) return 0;
                    return (totalPhysical / expected) * 100;
                }
                return totalPhysical;
            };

            const calculateExecutedQty = (row, act, mode = 'parcial') => {
                if (!act || !act.subActividades || act.subActividades.length === 0) return 0;

                const isEDP = activeTab === 'edp';
                const fisicaData = row.subActivityProgress || {};
                const edpData = row.subActivityProgressEDP || {};
                const allSubs = act.subActividades;
                let totalExecuted = 0;

                const takeoff = calculateTakeoff(row);

                if (isEDP) {
                    const physicalP = takeoff > 0 ? (calculatePhysicalProgress(row, act) / takeoff * 100) : 0;
                    
                    // EDP: agrupar por el campo 'grupoEDP' (o 'nombre' si está vacío)
                    const groupsMap = {};
                    allSubs.forEach(s => {
                        const gName = (s.grupoEDP || s.nombre || '').trim();
                        if (!groupsMap[gName]) groupsMap[gName] = { name: gName, weight: 0, subs: [] };
                        groupsMap[gName].weight += (parseFloat(s.porcentajeEDP) || 0);
                        groupsMap[gName].subs.push(s);
                    });

                    Object.values(groupsMap).forEach(g => {
                        if (g.weight <= 0) return;
                        
                        const isProtocolo = (g.name || '').toLowerCase().includes('protocolo');
                        
                        if (isProtocolo) {
                            // Lógica Protocolo: Solo si físico base (no protocolo) == 100%
                            const physicalBaseP = calculatePhysicalProgress(row, act, true);
                            if (physicalBaseP >= 99.9) { 
                                const subId = g.subs && g.subs[0] ? g.subs[0].id : null;
                                const manualVal = subId ? (parseFloat(edpData[subId]) || 0) : 0;
                                totalExecuted += manualVal * g.weight / 100;
                            }
                        } else {
                            // Lógica estricta: El avance EDP solo cuenta si TODAS las sub-actividades físicas del grupo tienen avance
                            const fyzVals = g.subs.map(s => parseFloat(fisicaData[s.id]) || 0);
                            const allHaveProgress = fyzVals.length > 0 && fyzVals.every(v => v > 0);
                            
                            if (allHaveProgress) {
                                const avg = fyzVals.reduce((a, b) => a + b, 0) / fyzVals.length;
                                totalExecuted += avg * g.weight / 100;
                            }
                        }
                    });
                } else {
                    // FÍSICO
                    if (mode === 'real') {
                        const subsReal = allSubs.filter(s => !(s.nombre || '').toLowerCase().includes('protocolo'));
                        if (subsReal.length === 0) return 0;

                        const sumVal = subsReal.reduce((acc, s) => acc + (parseFloat(fisicaData[s.id]) || 0), 0);
                        totalExecuted = sumVal / subsReal.length;
                    } else {
                        totalExecuted = calculatePhysicalProgress(row, act);
                    }
                }

                return Math.round(totalExecuted * 100) / 100;
            };


            const renderSubActivities = (row, act, maxSubs) => {
                if (!act || !act.subActividades || act.subActividades.length === 0)
                    return <td class="p-3 border border-slate-200 text-center text-slate-400 text-xs italic" colSpan={maxSubs}>-</td>;

                const isEDP = activeTab === 'edp';
                const allSubs = act.subActividades;
                const fisicaData = row.subActivityProgress || {};

                if (isEDP) {
                    // ---- MODO EDP ----
                    // Agrupar por grupoEDP
                    const groupsList = [];
                    allSubs.forEach(s => {
                        const gName = (s.grupoEDP || s.nombre || '').trim();
                        let g = groupsList.find(x => x.name === gName);
                        if (!g) {
                            g = { name: gName, weight: 0, subs: [] };
                            groupsList.push(g);
                        }
                        g.weight += (parseFloat(s.porcentajeEDP) || 0);
                        g.subs.push(s);
                    });

                    const activeGroups = groupsList.filter(g => g.weight > 0);
                    if (activeGroups.length === 0)
                        return <td class="p-3 border border-slate-200 text-center text-slate-400 text-xs italic" colSpan={maxSubs}>-</td>;

                    const takeoff = calculateTakeoff(row);
                    const physicalP = takeoff > 0 ? (calculatePhysicalProgress(row, act) / takeoff * 100) : 0;
                    const edpData = row.subActivityProgressEDP || {};

                    return (
                        <td class="p-0 border border-slate-200 bg-amber-50/10" colSpan={maxSubs}>
                            <div class="flex h-full min-h-[48px]">
                                {activeGroups.map((g, idx) => {
                                    const isProtocolo = (g.name || '').toLowerCase().includes('protocolo');
                                    const firstSubId = g.subs && g.subs[0] ? g.subs[0].id : null;

                                    if (isProtocolo) {
                                        const physicalBaseP = calculatePhysicalProgress(row, act, true);
                                        const isEnabled = physicalBaseP >= 99.9; 
                                        return (
                                            <div key={g.name || idx} class={`flex-1 min-w-[110px] p-1 flex flex-col items-center justify-center gap-0.5 ${idx < activeGroups.length - 1 ? 'border-r border-amber-100' : ''} ${isEnabled ? 'bg-emerald-50' : 'bg-slate-100 opacity-60'}`}>
                                                {!isEnabled && <span class="text-[8px] font-bold text-slate-400 uppercase">Bloq. &lt; 100% Fís.</span>}
                                                <input
                                                    type="number"
                                                    disabled={!isEnabled}
                                                    class={`w-full text-center border-none bg-transparent rounded p-1 text-[13px] outline-none ${isEnabled ? 'focus:ring-1 focus:ring-emerald-400 font-black text-emerald-900' : 'text-slate-400 font-bold'}`}
                                                    placeholder={isEnabled ? "0.00" : "-"}
                                                    value={(isEnabled && firstSubId) ? (edpData[firstSubId] || '') : ''}
                                                    onChange={e => firstSubId && updateSubActivityProgress(row.id, firstSubId, e.target.value)}
                                                />
                                            </div>
                                        );
                                    }

                                    const fisicaVals = g.subs.map(s => parseFloat(fisicaData[s.id]) || 0);
                                    const allHaveProgress = fisicaVals.length > 0 && fisicaVals.every(v => v > 0);
                                    const avg = (allHaveProgress && fisicaVals.length > 0) ? (fisicaVals.reduce((a, b) => a + b, 0) / fisicaVals.length) : 0;
                                    
                                    return (
                                        <div key={g.name || idx} class={`flex-1 min-w-[110px] p-1 flex flex-col items-center justify-center gap-0.5 ${idx < activeGroups.length - 1 ? 'border-r border-amber-100' : ''} bg-amber-50/20`}>
                                            <span class="text-[14px] font-black text-amber-900">
                                                {(allHaveProgress && !isNaN(avg)) ? avg.toLocaleString('es-CL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '-'}
                                            </span>
                                        </div>
                                    );
                                })}
                            </div>
                        </td>
                    );
                } else {
                    // ---- MODO FÍSICO ----
                    const filteredSubs = allSubs.filter(s => (parseFloat(s.porcentaje) || 0) > 0);
                    if (filteredSubs.length === 0)
                        return <td class="p-3 border border-slate-200 text-center text-slate-400 text-xs italic" colSpan={maxSubs}>-</td>;

                    return (
                        <td class="p-0 border border-slate-200 bg-slate-50/20" colSpan={maxSubs}>
                            <div class="flex h-full min-h-[40px]">
                                {filteredSubs.map((sub, idx) => (
                                    <div key={sub.id} class={`flex-1 min-w-[120px] p-1 flex items-center justify-center ${idx !== filteredSubs.length - 1 ? 'border-r border-slate-100' : ''}`}>
                                        <input
                                            type="number"
                                            class="w-full text-center border-none bg-transparent rounded p-1 text-[11px] outline-none focus:ring-1 focus:ring-blue-400 font-bold text-slate-700 transition-all h-8"
                                            placeholder="0.0"
                                            value={fisicaData[sub.id] || ''}
                                            onChange={e => updateSubActivityProgress(row.id, sub.id, e.target.value)}
                                        />
                                    </div>
                                ))}
                            </div>
                        </td>
                    );
                }
            };

            let maxSubActivities = 1;
            const isEDP_view = activeTab === 'edp';
            rows.forEach(r => {
                if (r.actividadId) {
                    const act = actividades.find(a => a.id === r.actividadId);
                    if (act && act.subActividades) {
                        const filtered = (act.subActividades || []).filter(sub => {
                            const weight = isEDP_view ? (parseFloat(sub.porcentajeEDP) || 0) : (parseFloat(sub.porcentaje) || 0);
                            return weight > 0;
                        });
                        if (filtered.length > maxSubActivities) {
                            maxSubActivities = filtered.length;
                        }
                    }
                }
            });
            
            // El botón de agregar ya no está en la tabla → effectiveMaxSubs = maxSubActivities alone
            const effectiveMaxSubs = maxSubActivities;

            let maxMathParams = 2;
            rows.forEach(r => {
                if (r.unidadId) {
                    const u = unidades.find(un => un.id === r.unidadId);
                    if (u && u.params && u.params.length > maxMathParams) {
                        maxMathParams = u.params.length;
                    }
                }
            });

            const getColWidth = (col) => {
                const c = col.toLowerCase();
                if (c === 'item') return 70;
                if (c === 'descripción' || c === 'descripcion' || c === 'desc') return 350;
                if (c === 'ubicación' || c === 'ubicacion') return 200;
                if (c === 'elemento') return 150;
                return 120;
            };

            return (
                <div class="space-y-4">
                    {/* Header & Settings */}
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div class="flex items-center gap-4">
                                <span class="text-3xl">📊</span>
                                <div>
                                    <h2 class="font-extrabold text-slate-800 text-xl">Planilla de Cubicaciones Inteligente</h2>
                                    <p class="text-xs text-slate-500">Avance y cálculo dinámico (Ponderaciones heredadas del proyecto)</p>
                                </div>
                            </div>

                            <div class="flex flex-col gap-3 border-t md:border-t-0 border-slate-100 pt-4 md:pt-0">
                                {/* Row 1: Filters + Add Column */}
                                <div class="flex flex-col sm:flex-row items-center gap-3">
                                    <div class="w-full sm:w-56">
                                        <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Proyecto Activo</label>
                                        <select class="w-full border border-slate-200 rounded-lg p-2.5 text-sm bg-blue-50 focus:ring-2 focus:ring-blue-500 outline-none font-bold text-blue-800 cursor-pointer shadow-sm" value={activeProject} onChange={e => {
                                            setActiveProject(e.target.value);
                                            setActiveEspecialidadFilter('');
                                            setActiveActivityFilter('');
                                        }}>
                                            <option value="">-- Seleccionar Obra --</option>
                                            {proyectos.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
                                        </select>
                                    </div>
                                    {activeProject && (
                                        <div class="w-full sm:w-52 animate-in fade-in zoom-in duration-300">
                                            <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 ml-1">Especialidad</label>
                                            <select class="w-full border border-slate-200 rounded-lg p-2.5 text-sm bg-white focus:ring-2 focus:ring-blue-500 outline-none font-bold text-blue-600 cursor-pointer shadow-sm"
                                                    value={activeEspecialidadFilter} 
                                                    onChange={e => {
                                                        setActiveEspecialidadFilter(e.target.value);
                                                        setActiveActivityFilter(''); 
                                                    }}>
                                                <option value="">-- Todas las Especialidades --</option>
                                                {especialidades && especialidades.map(esp => (
                                                    <option key={esp.id} value={esp.id}>{esp.nombre}</option>
                                                ))}
                                            </select>
                                        </div>
                                    )}
                                    {activeProject && (
                                        <div class="w-full sm:w-52 animate-in fade-in zoom-in duration-300">
                                            <label class="block text-[9px] font-bold text-amber-500 uppercase tracking-widest mb-1.5 ml-1">Actividad a Cubicar</label>
                                            <select class="w-full border border-amber-200 rounded-lg p-2.5 text-sm bg-amber-50 focus:ring-2 focus:ring-amber-500 outline-none font-bold text-amber-800 cursor-pointer shadow-sm" value={activeActivityFilter} onChange={e => setActiveActivityFilter(e.target.value)}>
                                                <option value="">-- Seleccionar Actividad --</option>
                                                {proyectos.find(p => p.id === parseInt(activeProject))?.actividades.map(actId => {
                                                    const act = actividades.find(a => a.id === actId);
                                                    if (!act) return null;
                                                    if (activeEspecialidadFilter && act.especialidadId != activeEspecialidadFilter) return null;
                                                    return <option key={actId} value={actId}>{act.nombre}</option>;
                                                })}
                                            </select>
                                        </div>
                                    )}
                                    <button class="w-full sm:w-auto bg-slate-100 text-slate-600 border border-slate-200 px-4 py-2.5 rounded-lg text-xs font-bold hover:bg-slate-200 flex items-center justify-center gap-2 transition-colors mt-0 sm:mt-5" onClick={() => setShowNewColForm(!showNewColForm)}>
                                        <span>+</span> Añadir Columna
                                    </button>
                                </div>
                                {/* Row 2: Action buttons — only when project+activity selected */}
                                {activeProject && activeActivityFilter && (
                                    <div class="flex flex-wrap items-center gap-2 pt-2 border-t border-slate-100 animate-in fade-in slide-in-from-top-2 duration-300">
                                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mr-1">Acciones:</span>
                                        <button class="bg-slate-100 text-slate-700 border border-slate-300 px-3 py-2 rounded-lg text-xs font-bold hover:bg-slate-200 flex items-center gap-1.5 transition-colors shadow-sm" onClick={downloadTemplate}>
                                            <span>📥</span> Plantilla
                                        </button>
                                        <label class="bg-indigo-600 text-white px-3 py-2 rounded-lg text-xs font-bold hover:bg-indigo-700 flex items-center gap-1.5 transition-colors shadow-md cursor-pointer">
                                            <span>📤</span> Subir Excel
                                            <input type="file" accept=".xlsx, .xls" class="hidden" onChange={handleFileUpload} />
                                        </label>
                                        <div class="h-5 w-px bg-slate-200 mx-1"></div>
                                        <button class="bg-green-700 text-white px-3 py-2 rounded-lg text-xs font-bold hover:bg-green-800 flex items-center gap-1.5 transition-colors shadow-md" onClick={exportToExcel}>
                                            <span>📊</span> Exportar Excel
                                        </button>
                                        {activeTab === 'edp' && (
                                            <button id="btn-export-pdf" class="bg-red-600 text-white px-3 py-2 rounded-lg text-xs font-bold hover:bg-red-700 flex items-center gap-1.5 transition-colors shadow-md" onClick={exportToPDF}>
                                                <span>📄</span> Exportar PDF
                                            </button>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {showNewColForm && (
                        <div class="bg-slate-50 border border-slate-200 p-4 rounded-xl flex gap-2 items-center animate-in slide-in-from-top-2 shadow-inner">
                            <input type="text" placeholder="Ej: Piso, Sector, Plano Referencia" class="border border-slate-300 rounded px-3 py-2 text-sm outline-none w-64 focus:ring-2 focus:ring-blue-400 bg-white shadow-sm" value={newColName} onChange={e => setNewColName(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAddColumn()} />
                            <button class="bg-blue-600 text-white px-5 py-2 rounded font-bold text-sm hover:bg-blue-700 shadow-md" onClick={handleAddColumn}>Agregar Columna</button>
                            <button class="text-slate-400 font-bold hover:text-slate-600 px-3" onClick={() => setShowNewColForm(false)}>Cancelar</button>
                        </div>
                    )}

                    {activeProject && !activeActivityFilter && (
                        <div class="bg-amber-50 border-2 border-dashed border-amber-200 rounded-2xl p-12 text-center shadow-inner mt-4 animate-in fade-in zoom-in duration-300">
                            <div class="text-amber-300 text-6xl mb-4">📋</div>
                            <h3 class="text-xl font-extrabold text-amber-800">Seleccione una Actividad</h3>
                            <p class="text-amber-600/70 mt-2 text-sm">Seleccione una actividad en el menú superior para comenzar a ingresar o visualizar cubicaciones.</p>
                        </div>
                    )}

                    {activeProject && activeActivityFilter && (
                        <div class="bg-white p-5 rounded-xl shadow-lg border border-slate-200 animate-in fade-in slide-in-from-top-4 duration-500" id="tabla-cubicaciones-container">
                            
                            {/* Tabs Estilo Excel */}
                            <div class="flex border-b border-slate-200 mb-6 bg-slate-50 rounded-t-xl overflow-hidden">
                                <button 
                                    class={`px-6 py-3 text-xs font-bold uppercase tracking-widest transition-all flex items-center gap-2 border-r border-slate-200 ${activeTab === 'fisico' ? 'bg-white text-blue-600 border-b-2 border-b-blue-500 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]' : 'text-slate-400 hover:bg-slate-100 hover:text-slate-600'}`}
                                    onClick={() => setActiveTab('fisico')}
                                >
                                    <span class="text-base">🏗️</span> Avance Físico
                                </button>
                                <button

        const useLocalStorageState = (key, initialValue) => {
            const [state, setState] = useState(() => {
                try {
                    const item = localStorage.getItem(key);
                    if (item) {
                        const parsed = JSON.parse(item);
                        // Validation: If we expect an array but get something else, reject it
                        if (Array.isArray(initialValue) && !Array.isArray(parsed)) {
                            console.warn(`Local storage value for ${key} is not an array, falling back to default.`);
                            return initialValue;
                        }
                        return parsed;
                    }
                    return initialValue;
                } catch (error) {
                    return initialValue;
                }
            });

            useEffect(() => {
                try {
                    localStorage.setItem(key, JSON.stringify(state));
                } catch (error) {
                    console.error('Error saving to localStorage', error);
                }
            }, [key, state]);

            return [state, setState];
        };

        const App = () => {
            const [page, setPage] = useState('Planificacion');
            const [uploadedProgram, setUploadedProgram] = useState([]);
            const [selectedPlanningProject, setSelectedPlanningProject] = useState('');
            const [itemizadosPorProyecto, setItemizadosPorProyecto] = useLocalStorageState('app_itemizados', {});
            const [matrizMCMappings, setMatrizMCMappings] = useState({});
            const [selectedMatrizProject, setSelectedMatrizProject] = useState('');

            const updateItemizadosGlobal = (projectId, list) => {
                setItemizadosPorProyecto(prev => ({ ...prev, [projectId]: list }));
            };

            const handleExportDB = () => {
                const data = {};
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    data[key] = localStorage.getItem(key);
                }
                
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `eimicub_full_backup_${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleImportDB = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        Object.keys(data).forEach(key => {
                            if (data[key] !== null && data[key] !== undefined) {
                                // Soporta versiones anteriores que guardaban JSON.parse y versiones nuevas que guardan strings
                                if (typeof data[key] === 'string') {
                                    localStorage.setItem(key, data[key]);
                                } else {
                                    localStorage.setItem(key, JSON.stringify(data[key]));
                                }
                            }
