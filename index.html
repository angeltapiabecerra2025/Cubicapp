                                                        <p>Para crear la Matriz MC, el proyecto debe tener cargado tanto el Programa como el Itemizado.</p>
                                                        <p class="flex items-center justify-center gap-2">
                                                            {projectProgram.length === 0 ? <span class="text-red-500">❌ Programa faltante</span> : <span class="text-emerald-500">✓ Programa ({projectProgram.length} act.)</span>}
                                                            <span class="text-slate-300">|</span>
                                                            {projectPartidas.length === 0 ? <span class="text-red-500">❌ Itemizado faltante</span> : <span class="text-emerald-500">✓ Itemizado ({projectPartidas.length} ítems)</span>}
                                                        </p>
                                                    </div>
                                                </div>
                                            );
                                        }

                                        // Ensure the project exists in mapping state
                                        const currentMap = matrizMCMappings[projId] || {};
                                        
                                        const setMapping = (taskId, itemId) => {
                                            setMatrizMCMappings(prev => ({
                                                ...prev,
                                                [projId]: {
                                                    ...prev[projId],
                                                    [taskId]: itemId
                                                }
                                            }));
                                        };

                                        const mappedCount = Object.keys(currentMap).filter(k => currentMap[k]).length;
                                        const totalCount = projectProgram.length;
                                        const progress = totalCount > 0 ? (mappedCount / totalCount) * 100 : 0;

                                        return (
                                            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                                                <div class="p-6 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
                                                    <div>
                                                        <h3 class="font-bold text-slate-800 text-lg">Matriz de Correlación</h3>
                                                        <p class="text-[11px] text-slate-500 mt-1">Vincule cada actividad del gantt con su ítem presupuestario correspondiente.</p>
                                                    </div>
                                                    <div class="w-64">
                                                        <div class="flex justify-between text-[10px] font-bold text-slate-500 mb-1">
                                                            <span>Avance Correlación</span>
                                                            <span>{mappedCount} / {totalCount} ({progress.toFixed(0)}%)</span>
                                                        </div>
                                                        <div class="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
                                                            <div class="h-full bg-blue-500 transition-all duration-500" style={{width: `${progress}%`}}></div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="overflow-x-auto">
                                                    <table class="w-full text-left table-fixed min-w-[900px]">
                                                        <thead class="bg-white text-[10px] uppercase font-bold text-slate-400 border-b border-slate-100">
                                                            <tr>
                                                                <th class="p-4 px-6 w-1/4">ID Task (Gantt)</th>
                                                                <th class="p-4 px-6 w-1/3">Actividad Programa</th>
                                                                <th class="p-4 px-6">Partida de Obra Vinculada</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody class="divide-y divide-slate-50">
                                                            {projectProgram.map(task => (
                                                                <tr key={task.id} class="text-xs hover:bg-slate-50 transition-colors">
                                                                    <td class="p-4 px-6">
                                                                        <div class="font-mono font-bold text-slate-500">{task.taskId}</div>
                                                                        <div class="text-[10px] text-slate-400 mt-0.5">Sub ID: {task.subId}</div>
                                                                    </td>
                                                                    <td class="p-4 px-6">
                                                                        <div class="font-bold text-slate-800">{task.name}</div>
                                                                        <div class="text-[10px] text-slate-500 mt-0.5">{task.start} al {task.end}</div>
                                                                    </td>
                                                                    <td class="p-4 px-6">
                                                                        <select 
                                                                            class={`w-full border ${currentMap[task.id] ? 'border-emerald-300 bg-emerald-50 text-emerald-800' : 'border-slate-200 bg-white'} rounded-lg p-2 text-xs focus:ring-2 focus:ring-blue-500 outline-none transition-colors`}
                                                                            value={currentMap[task.id] || ''}
                                                                            onChange={(e) => setMapping(task.id, e.target.value)}
                                                                        >
                                                                            <option value="">-- No vinculado --</option>
                                                                            {projectPartidas.map(pt => (
                                                                                <option key={pt._id} value={pt._id}>
                                                                                    {pt.Item} - {pt.Descripcion_Item}
                                                                                </option>
                                                                            ))}
                                                                        </select>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        );
                                    })()}
                                </div>
                            ) : page === 'Cubicaciones' ? (
                                <CubicacionesPage 
                                    actividades={actividadesInternas} 
                                    setActividades={setActividadesInternas}
                                    unidades={unidadesInternas} 
                                    proyectos={proyectosInternas} 
                                    ponderaciones={ponderaciones} 
                                    especialidades={especialidadesInternas} 
                                    itemizadosPorProyecto={itemizadosPorProyecto} 
                                    showSuccess={showSuccess}
                                    askConfirm={askConfirm}
                                />
                            ) : (
                                <div class="bg-white p-12 rounded-2xl border-2 border-dashed border-slate-200 text-center">
                                    <h3 class="text-xl font-bold text-slate-400">Contenido de {page} en desarrollo</h3>
                                    <p class="text-slate-400 mt-2">Los archivos JSX correspondientes contienen la lógica completa.</p>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Modal de Confirmación Global */}
                    {confirm.show && (
                        <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6 animate-in zoom-in-95" onClick={(e) => e.stopPropagation()}>
                                <h3 class="font-bold text-lg text-slate-800 mb-2">{confirm.title}</h3>
                                <p class="text-sm text-slate-500 mb-6">{confirm.msg}</p>
                                <div class="flex flex-col sm:flex-row gap-3">
                                    <button class="flex-1 py-2.5 rounded-lg font-bold text-sm bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors" onClick={() => setConfirm({ ...confirm, show: false })}>
                                        Cancelar
                                    </button>
                                    <button class="flex-1 py-2.5 rounded-lg font-bold text-sm bg-red-500 text-white hover:bg-red-600 transition-colors shadow-lg shadow-red-500/20" 
                                        onClick={() => {
                                            if (confirm.action) confirm.action();
                                            setConfirm({ ...confirm, show: false });
                                        }}>
                                        Confirmar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
