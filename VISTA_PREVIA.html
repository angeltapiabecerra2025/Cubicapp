<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista Previa - Sistema de Cubicaciones</title>
    <!-- React & Tailwind CDN for Quick Visualization only -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Mock Icons (replacing Lucide for CDN)
        const Icon = ({ name }) => {
            const icons = {
                dashboard: "📊",
                cubicaciones: "📐",
                planificacion: "📅",
                mantenedores: "⚙️",
                status: "✔️",
                user: "👤",
                edit: "✏️",
                delete: "🗑️",
                plus: "➕"
            };
            return <span>{icons[name]}</span>;
        };

        const App = () => {
            const [page, setPage] = useState('Dashboard');
            const [unidadesInternas, setUnidadesInternas] = useState([
                { id: 1, name: 'Metro Cúbico (m3)', formula: 'largo * ancho * alto', params: ['largo', 'ancho', 'alto'] },
                { id: 2, name: 'Metro Cuadrado (m2)', formula: 'largo * ancho', params: ['largo', 'ancho'] }
            ]);
            const [actividadesInternas, setActividadesInternas] = useState([
                {
                    id: 1,
                    nombre: 'Hormigón',
                    desc: 'Concreto y fundaciones',
                    subActividades: [
                        { id: 101, nombre: 'Excavaciones', desc: 'Fundaciones y pozos' },
                        { id: 102, nombre: 'Enfierradura', desc: 'Armadura de acero' }
                    ]
                },
                {
                    id: 2,
                    nombre: 'Acero',
                    desc: 'Estructuras metálicas',
                    subActividades: [
                        { id: 201, nombre: 'Montaje', desc: 'Izamiento de perfiles' }
                    ]
                }
            ]);
            const [usuariosInternas, setUsuariosInternas] = useState([
                { id: 1, nombre: 'Admin Sistema', email: 'admin@cubicapp.cl', rol: 'Administrator' },
                { id: 2, nombre: 'Juan Pérez', email: 'jperez@constructora.cl', rol: 'Project Manager' }
            ]);
            const [rolesInternas, setRolesInternas] = useState([
                { id: 1, nombre: 'Administrator', desc: 'Acceso total' },
                { id: 2, nombre: 'Project Manager', desc: 'Gestión de obras' }
            ]);
            const [especialidadesInternas, setEspecialidadesInternas] = useState([
                { id: 1, nombre: 'Electricidad', desc: 'Sistemas de potencia' },
                { id: 2, nombre: 'Climatización', desc: 'Aire acondicionado' }
            ]);
            const [proyectosInternas, setProyectosInternas] = useState([
                {
                    id: 1, nombre: 'Edificio Horizonte', descripcion: 'Construcción habitacional 20 pisos',
                    disciplinas: [1, 2],
                    personal: [
                        { id: 101, rol: 'Administrator', usuario: 'Admin Sistema', email: 'admin@cubicapp.cl' },
                        { id: 102, rol: 'Project Manager', usuario: 'Juan Pérez', email: 'jperez@constructora.cl' }
                    ]
                },
                {
                    id: 2, nombre: 'Mall Plaza Norte', descripcion: 'Remodelación ala poniente',
                    disciplinas: [2],
                    personal: []
                }
            ]);

            const [showForm, setShowForm] = useState(false);
            const [formUnit, setFormUnit] = useState({ name: '', formula: '', params_text: '' });
            const [formAct, setFormAct] = useState({ id: null, nombre: '', desc: '', subActividades: [] });
            const [formEsp, setFormEsp] = useState({ id: null, nombre: '', desc: '' });
            const [tempSub, setTempSub] = useState({ id: null, nombre: '', desc: '' });
            const [formUser, setFormUser] = useState({ id: null, nombre: '', email: '', rol: '' });
            const [formRole, setFormRole] = useState({ id: null, nombre: '', desc: '' });
            const [formProj, setFormProj] = useState({ id: null, nombre: '', descripcion: '', personal: [], actividades: [] });
            const [tempPersonal, setTempPersonal] = useState({ rol: '', usuario: '', email: '' });

            const [confirm, setConfirm] = useState({ show: false, title: '', msg: '', action: null });
            const [selectedProj, setSelectedProj] = useState(null);
            const [selectedAct, setSelectedAct] = useState(null);
            const [ponderaciones, setPonderaciones] = useState({});

            const askConfirm = (title, msg, action) => {
                setConfirm({ show: true, title, msg, action });
            };

            const handleSaveUnit = () => {
                const isEdit = formUnit.id !== undefined && formUnit.id !== null;
                askConfirm(isEdit ? 'Confirmar Modificación' : 'Confirmar Adición',
                    `¿Deseas ${isEdit ? 'actualizar' : 'crear'} esta unidad de medida?`, () => {
                        if (isEdit) {
                            setUnidadesInternas(unidadesInternas.map(u => u.id === formUnit.id ? formUnit : u));
                        } else {
                            setUnidadesInternas([...unidadesInternas, {
                                ...formUnit,
                                id: Date.now(),
                                params: formUnit.params_text.split(',').map(p => p.trim())
                            }]);
                        }
                        setShowForm(false);
                        setFormUnit({ name: '', formula: '', params_text: '' });
                    });
            };

            const handleDeleteUnit = (id) => {
                askConfirm('Confirmar Eliminación', '¿Estás seguro de eliminar esta unidad de medida?', () => {
                    setUnidadesInternas(unidadesInternas.filter(u => u.id !== id));
                });
            };

            const handleSaveAct = () => {
                const isEdit = formAct.id !== null;
                askConfirm(isEdit ? 'Confirmar Modificación' : 'Confirmar Adición',
                    `¿Deseas ${isEdit ? 'actualizar' : 'crear'} esta actividad?`, () => {
                        if (isEdit) {
                            setActividadesInternas(actividadesInternas.map(d => d.id === formAct.id ? formAct : d));
                        } else {
                            setActividadesInternas([...actividadesInternas, { ...formAct, id: Date.now() }]);
                        }
                        setShowForm(false);
                        setFormAct({ id: null, nombre: '', desc: '', subActividades: [] });
                        showSuccess(isEdit ? 'Actividad actualizada' : 'Actividad creada');
                    });
            };

            const handleDeleteAct = (id) => {
                askConfirm('Confirmar Eliminación', '¿Estás seguro de eliminar esta actividad?', () => {
                    setActividadesInternas(actividadesInternas.filter(d => d.id !== id));
                    showSuccess('Actividad eliminada');
                });
            };

            const handleSaveSub = () => {
                if (!tempSub.nombre) return;
                const isEdit = tempSub.id !== null;
                askConfirm(isEdit ? 'Confirmar Edición' : 'Confirmar Asignación', `¿Desea ${isEdit ? 'actualizar' : 'agregar'} la sub-actividad "${tempSub.nombre}"?`, () => {
                    let updated;
                    if (isEdit) {
                        updated = formAct.subActividades.map(s => s.id === tempSub.id ? tempSub : s);
                    } else {
                        updated = [...formAct.subActividades, { ...tempSub, id: Date.now() }];
                    }
                    setFormAct({ ...formAct, subActividades: updated });
                    setTempSub({ id: null, nombre: '', desc: '' });
                });
            };

            const handleDeleteSub = (id) => {
                askConfirm('Confirmar Eliminación', '¿Quitar esta sub-actividad?', () => {
                    setFormAct({ ...formAct, subActividades: formAct.subActividades.filter(s => s.id !== id) });
                });
            };

            const handleSaveUser = () => {
                const isEdit = formUser.id !== null;
                askConfirm(isEdit ? 'Confirmar Modificación' : 'Confirmar Registro',
                    `¿Deseas ${isEdit ? 'actualizar' : 'registrar'} a este usuario?`, () => {
                        if (isEdit) {
                            setUsuariosInternas(usuariosInternas.map(u => u.id === formUser.id ? formUser : u));
                        } else {
                            setUsuariosInternas([...usuariosInternas, { ...formUser, id: Date.now() }]);
                        }
                        setShowForm(false);
                        setFormUser({ id: null, nombre: '', email: '', rol: 'Administrator' });
                    });
            };

            const handleDeleteUser = (id) => {
                askConfirm('Confirmar Eliminación', '¿Estás seguro de eliminar a este usuario?', () => {
                    setUsuariosInternas(usuariosInternas.filter(u => u.id !== id));
                });
            };

            const handleSaveProj = () => {
                const isEdit = formProj.id !== null;
                askConfirm(isEdit ? 'Confirmar Modificación' : 'Confirmar Registro',
                    `¿Deseas ${isEdit ? 'actualizar' : 'registrar'} esta obra?`, () => {
                        if (isEdit) {
                            setProyectosInternas(proyectosInternas.map(p => p.id === formProj.id ? formProj : p));
                        } else {
                            setProyectosInternas([...proyectosInternas, { ...formProj, id: Date.now() }]);
                        }
                        setShowForm(false);
                        setFormProj({ id: null, nombre: '', descripcion: '', personal: [] });
                        showSuccess(isEdit ? 'Obra actualizada correctamente' : 'Obra registrada con éxito');
                    });
            };

            const handleDeleteProj = (id) => {
                askConfirm('Confirmar Eliminación', '¿Estás seguro de eliminar esta obra?', () => {
                    setProyectosInternas(proyectosInternas.filter(p => p.id !== id));
                    showSuccess('Obra eliminada permanentemente');
                });
            };

            const toggleActividadProj = (id) => {
                const current = formProj.actividades || [];
                const updated = current.includes(id) ? current.filter(x => x !== id) : [...current, id];
                setFormProj({ ...formProj, actividades: updated });
            };

            const [successMsg, setSuccessMsg] = useState({ show: false, text: '' });
            const showSuccess = (text) => {
                setSuccessMsg({ show: true, text });
                setTimeout(() => setSuccessMsg({ show: false, text: '' }), 3000);
            };

            const handleSaveEsp = () => {
                const isEdit = formEsp.id !== null;
                askConfirm(isEdit ? 'Confirmar Modificación' : 'Confirmar Registro',
                    `¿Deseas ${isEdit ? 'actualizar' : 'registrar'} esta especialidad?`, () => {
                        if (isEdit) {
                            setEspecialidadesInternas(especialidadesInternas.map(e => e.id === formEsp.id ? formEsp : e));
                        } else {
                            setEspecialidadesInternas([...especialidadesInternas, { ...formEsp, id: Date.now() }]);
                        }
                        setShowForm(false);
                    });
            };

            const handleDeleteEsp = (id) => {
                askConfirm('Confirmar Eliminación', '¿Estás seguro de eliminar esta especialidad?', () => {
                    setEspecialidadesInternas(especialidadesInternas.filter(e => e.id !== id));
                    showSuccess('Especialidad eliminada');
                });
            };

            const handleSaveRole = () => {
                const isEdit = formRole.id !== null;
                askConfirm(isEdit ? 'Confirmar Modificación' : 'Confirmar Adición',
                    `¿Deseas ${isEdit ? 'actualizar' : 'crear'} este rol?`, () => {
                        if (isEdit) {
                            setRolesInternas(rolesInternas.map(r => r.id === formRole.id ? formRole : r));
                        } else {
                            setRolesInternas([...rolesInternas, { ...formRole, id: Date.now() }]);
                        }
                        setShowForm(false);
                        setFormRole({ id: null, nombre: '', desc: '' });
                    });
            };

            const handleDeleteRole = (id) => {
                askConfirm('Confirmar Eliminación', '¿Estás seguro de eliminar este rol?', () => {
                    setRolesInternas(rolesInternas.filter(r => r.id !== id));
                });
            };

            const handleWeightChange = (subId, field, value) => {
                const key = `${selectedProj?.id}_${selectedAct?.id}_${subId}`;
                let val = value;
                if (value !== '') {
                    val = Math.min(100, Math.max(0, parseFloat(value) || 0));
                }
                setPonderaciones({
                    ...ponderaciones,
                    [key]: {
                        ...(ponderaciones[key] || { subId, cubicador: '', planificador: '', edp: '' }),
                        [field]: val
                    }
                });
            };

            const getWeightValue = (subId, field) => {
                const key = `${selectedProj?.id}_${selectedAct?.id}_${subId}`;
                const val = ponderaciones[key]?.[field];
                return (val === undefined || val === '') ? '' : val;
            };

            return (
                <div class="flex min-h-screen">
                    {/* Confirmation Overlay */}
                    {confirm.show && (
                        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div class="bg-white rounded-2xl shadow-2xl max-w-sm w-full p-8 text-center animate-in zoom-in duration-200">
                                <div class="text-amber-500 text-4xl mb-4">⚠️</div>
                                <h4 class="text-xl font-extrabold text-slate-800 mb-2">{confirm.title}</h4>
                                <p class="text-slate-500 text-sm mb-8">{confirm.msg}</p>
                                <div class="flex gap-3 justify-center">
                                    <button class="px-6 py-2.5 rounded-xl text-sm font-bold text-slate-500 hover:bg-slate-100 transition-colors" onClick={() => setConfirm({ ...confirm, show: false })}>Cancelar</button>
                                    <button class="px-6 py-2.5 rounded-xl text-sm font-bold bg-blue-600 text-white shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition-all" onClick={() => { confirm.action(); setConfirm({ ...confirm, show: false }); }}>Confirmar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Sidebar */}
                    <aside class="w-64 bg-[#0f172a] text-white flex flex-col fixed h-full">
                        {/* Success Notification */}
                        {successMsg.show && (
                            <div class="fixed top-6 right-6 z-[110] animate-in slide-in-from-right-8 duration-300">
                                <div class="bg-slate-900 border-l-4 border-green-500 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-4">
                                    <div class="bg-green-500 rounded-full w-8 h-8 flex items-center justify-center text-white font-bold">✓</div>
                                    <p class="text-sm font-bold">{successMsg.text}</p>
                                </div>
                            </div>
                        )}
                        <div class="p-8 flex items-center gap-3">
                            <span class="text-blue-500 text-3xl font-bold">📐</span>
                            <span class="text-xl font-extrabold tracking-tight">CUBICAPP</span>
                        </div>
                        <nav class="flex-1 px-4">
                            <p class="text-[10px] font-bold text-slate-500 mb-4 px-4 tracking-widest uppercase">Menú Principal</p>
                            <ul class="space-y-1">
                                {['Dashboard', 'Cubicaciones', 'Planificación', 'Mantenedores'].map(item => (
                                    <li key={item}>
                                        <a href="#" class={`flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${page === item || ['Unidades', 'Disciplinas', 'Usuarios', 'Roles', 'Proyectos'].includes(page) && item === 'Mantenedores' ? 'bg-blue-600' : 'hover:bg-slate-800 text-slate-300 hover:text-white'}`} onClick={() => { setPage(item); setShowForm(false); }}>
                                            <Icon name={item.toLowerCase().replace('ó', 'o')} />
                                            <span class="text-sm font-medium">{item}</span>
                                        </a>
                                    </li>
                                ))}
                            </ul>
                        </nav>
                        <div class="p-6 border-t border-slate-800 mt-auto flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-slate-400">
                                <Icon name="user" />
                            </div>
                            <div>
                                <p class="text-xs font-semibold">Usuario Demo</p>
                                <p class="text-[10px] text-slate-500">Super Usuario</p>
                            </div>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main class="ml-64 flex-1 flex flex-col">
                        <header class="bg-white border-b border-slate-200 px-10 py-6 flex justify-between items-center sticky top-0">
                            <h1 class="text-2xl font-bold text-slate-800">
                                {page === 'Unidades' ? 'Unidades de Medida' : page === 'Actividades' ? 'Actividades' : page === 'Especialidades' ? 'Especialidades' : page === 'Usuarios' ? 'Usuarios' : page === 'Roles' ? 'Roles de Sistema' : page === 'Proyectos' ? 'Mantenedor de Proyectos' : page}
                            </h1>
                            <button class="bg-blue-600 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition-all">
                                Exportar Reporte
                            </button>
                        </header>

                        <div class="p-10 max-w-7xl">
                            {page === 'Dashboard' ? (
                                <div class="space-y-8">
                                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        {[
                                            { label: 'Proyectos Activos', value: String(proyectosInternas.length) },
                                            { label: 'Cubicaciones Pendientes', value: '45' },
                                            { label: 'Planificaciones del Mes', value: '8' }
                                        ].map(stat => (
                                            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                                                <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">{stat.label}</p>
                                                <p class="text-3xl font-extrabold text-slate-900">{stat.value}</p>
                                            </div>
                                        ))}
                                    </div>

                                    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
                                            <h3 class="font-bold text-slate-800">Actividad Reciente</h3>
                                        </div>
                                        <table class="w-full text-left">
                                            <thead class="bg-slate-50 border-b border-slate-100">
                                                <tr>
                                                    <th class="p-4 text-xs font-bold text-slate-500 uppercase px-6">Proyecto</th>
                                                    <th class="p-4 text-xs font-bold text-slate-500 uppercase px-6">Disciplina</th>
                                                    <th class="p-4 text-xs font-bold text-slate-500 uppercase px-6">Estado</th>
                                                    <th class="p-4 text-xs font-bold text-slate-500 uppercase px-6">Fecha</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-slate-50">
                                                <tr>
                                                    <td class="p-4 px-6 text-sm font-medium">Edificio Horizonte</td>
                                                    <td class="p-4 px-6 text-sm text-slate-600">Estructuras</td>
                                                    <td class="p-4 px-6"><span class="px-3 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded-full uppercase">Aprobado</span></td>
                                                    <td class="p-4 px-6 text-sm text-slate-500">23/02/2026</td>
                                                </tr>
                                                <tr>
                                                    <td class="p-4 px-6 text-sm font-medium">Mall Plaza Norte</td>
                                                    <td class="p-4 px-6 text-sm text-slate-600">Instalaciones</td>
                                                    <td class="p-4 px-6"><span class="px-3 py-1 bg-yellow-100 text-yellow-700 text-[10px] font-bold rounded-full uppercase">En Revisión</span></td>
                                                    <td class="p-4 px-6 text-sm text-slate-500">22/02/2026</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            ) : page === 'Mantenedores' ? (
                                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {[
                                        { title: 'Usuarios', desc: 'Gestión de cuentas', special: 'Usuarios' },
                                        { title: 'Roles', desc: 'Permisos dinámicos', special: 'Roles' },
                                        { title: 'Actividades', desc: 'Estructuras, Acero, etc.', special: 'Actividades' },
                                        { title: 'Especialidades', desc: 'Electricidad, Clima, etc.', special: 'Especialidades' },
                                        { title: 'Unidades de Medida', desc: 'Fórmulas y Parámetros', special: 'Unidades' },
                                        { title: 'Partidas de Obra', desc: 'Configuración inicial de obras.', special: 'Partidas' },
                                        { title: 'Proyectos', desc: 'Configuración inicial de obras.', special: 'Proyectos' }
                                    ].map(item => (
                                        <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm hover:shadow-md transition-shadow">
                                            <h4 class="font-bold text-slate-800">{item.title}</h4>
                                            <p class="text-sm text-slate-500 mt-1 mb-4">{item.desc}</p>
                                            <button class="text-blue-600 text-xs font-bold uppercase tracking-wider hover:underline" onClick={() => { if (item.special) { setPage(item.special); setShowForm(false); } }}>
                                                Gestionar
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            ) : page === 'Unidades' ? (
                                <div class="space-y-6">
                                    <div class="flex justify-between items-center">
                                        <button class="text-slate-500 text-sm font-medium flex items-center gap-2 hover:text-blue-600" onClick={() => { setPage('Mantenedores'); setShowForm(false); }}>
                                            ← Volver a Mantenedores
                                        </button>
                                        {!showForm && (
                                            <button class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-lg shadow-blue-500/20 hover:bg-blue-700 flex items-center gap-2" onClick={() => { setShowForm(true); setFormUnit({ name: '', formula: '', params_text: '' }); }}>
                                                <Icon name="plus" /> Nueva Unidad
                                            </button>
                                        )}
                                    </div>

                                    {showForm ? (
                                        <div class="bg-white rounded-xl border border-blue-200 shadow-xl p-8 animate-in fade-in slide-in-from-bottom-4 duration-300">
                                            <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                                                <h3 class="font-bold text-lg text-slate-800">{formUnit.id ? 'Editar Unidad de Medida' : 'Nueva Unidad de Medida'}</h3>
                                                <button class="bg-blue-600 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-lg shadow-blue-500/20 hover:bg-blue-700" onClick={handleSaveUnit}>Guardar Unidad</button>
                                            </div>
                                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                                <div>
                                                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Nombre y Abreviatura</label>
                                                    <input class="w-full border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ej: Toneladas (ton)" value={formUnit.name} onChange={e => setFormUnit({ ...formUnit, name: e.target.value })} />
                                                </div>
                                                <div>
                                                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Parámetros (separados por coma)</label>
                                                    <input class="w-full border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ej: peso_esp, volumen" value={formUnit.params_text} onChange={e => setFormUnit({ ...formUnit, params_text: e.target.value })} />
                                                </div>
                                            </div>
                                            <div class="mb-8">
                                                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Fórmula de Cálculo</label>
                                                <div class="relative">
                                                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold">ƒx</span>
                                                    <input class="w-full border border-slate-200 bg-slate-50 rounded-lg p-3 pl-10 text-sm font-mono text-blue-600 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ej: peso_esp * volumen" value={formUnit.formula} onChange={e => setFormUnit({ ...formUnit, formula: e.target.value })} />
                                                </div>
                                            </div>
                                            <div class="flex justify-end gap-3 pt-6 border-t border-slate-100">

                                                            <button
                                                                key={d.id}
                                                                class={`px-4 py-2 rounded-full text-[10px] font-extrabold transition-all border uppercase tracking-wider ${isSelected ? 'bg-blue-600 border-blue-600 text-white shadow-lg shadow-blue-500/30' : 'bg-white border-slate-200 text-slate-400 hover:border-blue-300'}`}
                                                                onClick={() => toggleDisciplinaProj(d.id)}
                                                            >
                                                                {isSelected && <span class="mr-1">✓</span>}
                                                                {d.nombre}
                                                            </button>
                                                        );
                                                    })}
                                                </div>
                                            </div>

                                            <div class="bg-slate-50 p-6 rounded-xl border border-slate-200 mt-8">
                                                <h4 class="text-xs font-bold text-blue-600 uppercase tracking-widest mb-4">Asignación de Personal y Roles</h4>
                                                <div class="flex gap-3 mb-6 items-end">
                                                    <div class="flex-1">
                                                        <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Nombre Usuario</label>
                                                        <input class="w-full border border-slate-200 rounded-lg p-2.5 text-sm bg-white" placeholder="Ej: Juan Pérez" value={tempPersonal.usuario} onChange={e => setTempPersonal({ ...tempPersonal, usuario: e.target.value })} />
                                                    </div>
                                                    <div class="flex-1">
                                                        <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Email Empresa</label>
                                                        <input class="w-full border border-slate-200 rounded-lg p-2.5 text-sm bg-white" placeholder="ejemplo@constructora.cl" value={tempPersonal.email} onChange={e => setTempPersonal({ ...tempPersonal, email: e.target.value })} />
                                                    </div>
                                                    <div class="w-48">
                                                        <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Rol en Proyecto</label>
                                                        <select class="w-full border border-slate-200 rounded-lg p-2.5 text-sm bg-white" value={tempPersonal.rol} onChange={e => setTempPersonal({ ...tempPersonal, rol: e.target.value })}>
                                                            <option value="">Seleccionar...</option>
                                                            {rolesInternas.map(r => <option key={r.id} value={r.nombre}>{r.nombre}</option>)}
                                                        </select>
                                                    </div>
                                                    <button class="bg-slate-900 text-white px-5 py-2.5 rounded-lg text-xs font-bold hover:bg-black transition-colors flex items-center gap-2" onClick={() => {
                                                        if (tempPersonal.usuario && tempPersonal.rol && tempPersonal.email) {
                                                            askConfirm('Confirmar Asignación', `¿Asignar a ${tempPersonal.usuario} como ${tempPersonal.rol}?`, () => {
                                                                setFormProj({ ...formProj, personal: [...formProj.personal, { ...tempPersonal, id: Date.now() }] });
                                                                setTempPersonal({ rol: '', usuario: '', email: '' });
                                                            });
                                                        }
                                                    }}>
                                                        <Icon name="plus" /> Asignar
                                                    </button>
                                                </div>
                                                <div class="bg-white border border-slate-200 rounded-lg overflow-hidden shadow-sm">
                                                    <table class="w-full text-xs">
                                                        <thead class="bg-slate-50 border-b border-slate-100">
                                                            <tr>
                                                                <th class="p-3 font-bold text-slate-500 uppercase px-6">Personal</th>
                                                                <th class="p-3 font-bold text-slate-500 uppercase px-6">Rol Asignado</th>
                                                                <th class="p-3 text-right px-6">Remover</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody class="divide-y divide-slate-50">
                                                            {formProj.personal.length > 0 ? formProj.personal.map(p => (
                                                                <tr key={p.id}>
                                                                    <td class="p-3 px-6">
                                                                        <div class="flex flex-col">
                                                                            <span class="font-bold text-slate-700">{p.usuario}</span>
                                                                            <span class="text-[9px] text-slate-400 uppercase tracking-tighter">{p.email}</span>
                                                                        </div>
                                                                    </td>
                                                                    <td class="p-3 px-6"><span class="px-2 py-0.5 bg-blue-50 text-blue-600 rounded text-[9px] font-bold uppercase border border-blue-100">{p.rol}</span></td>
                                                                    <td class="p-3 px-6 text-right">
                                                                        <button class="text-slate-300 hover:text-red-500 transition-colors text-sm" title="Quitar" onClick={() => {
                                                                            askConfirm('Confirmar Quitar Personal', `¿Seguro que desea quitar a ${p.usuario}?`, () => {
                                                                                setFormProj({ ...formProj, personal: formProj.personal.filter(x => x.id !== p.id) });
                                                                            });
                                                                        }}><Icon name="delete" /></button>
                                                                    </td>
                                                                </tr>
                                                            )) : (
                                                                <tr><td colspan="3" class="p-6 text-center text-slate-400 text-[10px] italic">Sin personal asignado a esta obra aún.</td></tr>
                                                            )}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>

                                            <div class="flex justify-end gap-3 pt-8 border-t border-slate-100 mt-10">
                                                <button class="px-6 py-2.5 text-sm font-bold text-slate-500 hover:bg-slate-50 rounded-lg" onClick={() => setShowForm(false)}>Cancelar</button>
                                                <button class="px-8 py-2.5 bg-blue-600 text-white rounded-lg text-sm font-bold shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition-all" onClick={handleSaveProj}>Guardar Proyecto</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {proyectosInternas.map(p => (
                                                <div key={p.id} class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:border-blue-300 hover:shadow-xl hover:shadow-blue-500/5 transition-all group">
                                                    <div class="flex justify-between items-start mb-6">
                                                        <div>
                                                            <div class="flex items-center gap-2 mb-1">
                                                                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                                                                <h3 class="font-extrabold text-slate-800 text-lg uppercase tracking-tight">{p.nombre}</h3>
                                                            </div>
                                                            <p class="text-xs text-slate-400 font-medium mb-3">{p.descripcion}</p>
                                                            <div class="flex flex-wrap gap-1.5 mb-4">
                                                                {p.actividades && p.actividades.map(aId => {
                                                                    const a = actividadesInternas.find(x => x.id === aId);
                                                                    return a ? <span key={aId} class="px-2 py-0.5 bg-slate-50 text-slate-500 rounded text-[8px] font-bold uppercase border border-slate-100">{a.nombre}</span> : null;
                                                                })}
                                                            </div>
                                                        </div>
                                                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                                            <button class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="Editar" onClick={() => { setShowForm(true); setFormProj(p); }}>
                                                                <Icon name="edit" />
                                                            </button>
                                                            <button class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="Eliminar" onClick={() => handleDeleteProj(p.id)}>
                                                                <Icon name="delete" />
                                                            </button>
                                                        </div>
                                                    </div>
                                                    <div class="pt-6 border-t border-slate-50 flex items-center justify-between">
                                                        <div class="flex items-center gap-2">
                                                            <span class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">{p.personal.length} Personal Asignado</span>
                                                        </div>
                                                        <div class="flex -space-x-3">
                                                            {p.personal.slice(0, 3).map((u, i) => (
                                                                <div key={i} class="w-8 h-8 rounded-full bg-slate-900 border-2 border-white flex items-center justify-center text-[10px] text-white font-bold ring-2 ring-slate-50">{u.usuario.charAt(0)}</div>
                                                            ))}
                                                            {p.personal.length > 3 && <div class="w-8 h-8 rounded-full bg-blue-100 border-2 border-white flex items-center justify-center text-[10px] text-blue-600 font-bold">+{p.personal.length - 3}</div>}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                            <div class="bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl p-6 flex flex-col items-center justify-center cursor-pointer hover:bg-white hover:border-blue-400 transition-all group" onClick={() => { setShowForm(true); setFormProj({ id: null, nombre: '', descripcion: '', personal: [], actividades: [] }); }}>
                                                <div class="w-12 h-12 rounded-full bg-white border border-slate-200 flex items-center justify-center text-slate-400 group-hover:text-blue-500 group-hover:border-blue-200 transition-colors mb-4 text-2xl">+</div>
                                                <p class="text-xs font-bold text-slate-400 group-hover:text-blue-600 uppercase tracking-widest">Añadir Nueva Obra</p>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            ) : page === 'Partidas' ? (
                                <div class="space-y-6 text-left">
                                    <div class="flex justify-between items-center mb-6">
                                        <button class="text-slate-500 text-sm font-medium flex items-center gap-2 hover:text-blue-600" onClick={() => setPage('Mantenedores')}>
                                            ← Volver a Mantenedores
                                        </button>
                                        <div class="flex items-center gap-2 bg-blue-50 px-4 py-2 rounded-xl border border-blue-100">
                                            <span class="text-blue-600">📊</span>
                                            <h2 class="text-blue-900 font-extrabold text-sm uppercase tracking-tighter">Ponderación de Partidas</h2>
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <div>
                                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">1. Seleccionar Obra</label>
                                            <select
                                                class="w-full border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                                                onChange={(e) => {
                                                    const p = proyectosInternas.find(x => x.id === parseInt(e.target.value));
                                                    setSelectedProj(p);
                                                    setSelectedAct(null);
                                                }}
                                                value={selectedProj?.id || ''}
                                            >
                                                <option value="">Seleccione obra...</option>
                                                {proyectosInternas.map(p => <option key={p.id} value={p.id}>{p.nombre}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">2. Seleccionar Actividad</label>
                                            <select
                                                class="w-full border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white disabled:bg-slate-50 disabled:text-slate-400"
                                                disabled={!selectedProj}
                                                onChange={(e) => {
                                                    const d = actividadesInternas.find(x => x.id === parseInt(e.target.value));
                                                    setSelectedAct(d);
                                                }}
                                                value={selectedAct?.id || ''}
                                            >
                                                <option value="">Seleccione actividad...</option>
                                                {(selectedProj?.actividades || []).map(aId => {
                                                    const a = actividadesInternas.find(x => x.id === aId);
                                                    return a ? <option key={aId} value={aId}>{a.nombre}</option> : null;
                                                })}
                                            </select>
                                        </div>
                                    </div>

                                    {selectedProj && selectedAct ? (
                                        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden animate-in fade-in duration-300">
                                            <div class="p-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                                                <h4 class="text-xs font-bold text-slate-700 uppercase tracking-wider">Sub-Actividades: {selectedAct.nombre}</h4>
                                                <button
                                                    class="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold shadow-lg shadow-blue-500/20 hover:bg-blue-700 transition-all flex items-center gap-2"
                                                    onClick={() => askConfirm('Guardar Ponderaciones', '¿Deseas guardar los cambios en esta configuración?', () => showSuccess('Ponderaciones guardadas con éxito'))}
                                                >
                                                    <Icon name="status" /> Guardar Cambios
                                                </button>
                                            </div>
                                            <table class="w-full text-left">
                                                <thead class="bg-white border-b border-slate-100">
                                                    <tr>
                                                        <th class="p-4 text-[10px] font-bold text-slate-400 uppercase px-6">Sub-Actividad</th>
                                                        <th class="p-4 text-[10px] font-bold text-slate-400 uppercase px-6 text-center">Cubicador (%)</th>
                                                        <th class="p-4 text-[10px] font-bold text-slate-400 uppercase px-6 text-center">Planificador (%)</th>
                                                        <th class="p-4 text-[10px] font-bold text-slate-400 uppercase px-6 text-center">EDP (%)</th>
                                                    </tr>
                                                </thead>
                                                <tbody class="divide-y divide-slate-50">
                                                    {(selectedAct.subActividades || []).map(s => (
                                                        <tr key={s.id}>
                                                            <td class="p-4 px-6">
                                                                <p class="font-bold text-slate-800 text-sm">{s.nombre}</p>
                                                                <p class="text-[10px] text-slate-400 uppercase">{s.desc || s.descripcion}</p>
                                                            </td>
                                                            <td class="p-4 px-6 text-center">
                                                                <input
                                                                    type="number"
                                                                    class="w-16 border border-slate-200 rounded p-1 text-center text-sm font-bold text-blue-600"
                                                                    value={getWeightValue(s.id, 'cubicador')}
                                                                    onFocus={e => e.target.select()}
                                                                    onChange={e => handleWeightChange(s.id, 'cubicador', e.target.value)}
                                                                />
                                                            </td>
                                                            <td class="p-4 px-6 text-center">
                                                                <input
                                                                    type="number"
                                                                    class="w-16 border border-slate-200 rounded p-1 text-center text-sm font-bold text-blue-600"
                                                                    value={getWeightValue(s.id, 'planificador')}
                                                                    onFocus={e => e.target.select()}
                                                                    onChange={e => handleWeightChange(s.id, 'planificador', e.target.value)}
                                                                />
                                                            </td>
                                                            <td class="p-4 px-6 text-center">
                                                                <input
                                                                    type="number"
                                                                    class="w-16 border border-slate-200 rounded p-1 text-center text-sm font-bold text-blue-600"
                                                                    value={getWeightValue(s.id, 'edp')}
                                                                    onFocus={e => e.target.select()}
                                                                    onChange={e => handleWeightChange(s.id, 'edp', e.target.value)}
                                                                />
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    ) : (
                                        <div class="bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl p-12 text-center text-slate-400">
                                            <p class="text-sm italic">Debe seleccionar una obra y su actividad para configurar los porcentajes.</p>
                                        </div>
                                    )}
                                </div>
                            ) : (
                                <div class="bg-white p-12 rounded-2xl border-2 border-dashed border-slate-200 text-center">
                                    <h3 class="text-xl font-bold text-slate-400">Contenido de {page} en desarrollo</h3>
                                    <p class="text-slate-400 mt-2">Los archivos JSX correspondientes contienen la lógica completa.</p>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
